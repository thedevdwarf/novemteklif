<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="luna-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5aa7ff"></stop>
      <stop offset="40%" stop-color="#8b6bff"></stop>
      <stop offset="70%" stop-color="#c58bff"></stop>
      <stop offset="100%" stop-color="#ffd28a"></stop>
    </linearGradient>
    <radialGradient id="luna-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b6bff" stop-opacity="0.35"></stop>
      <stop offset="100%" stop-color="#8b6bff" stop-opacity="0"></stop>
    </radialGradient>
    <mask id="luna-crescent">
      <rect width="100%" height="100%" fill="black"></rect>
      <circle cx="40" cy="40" r="26" fill="white"></circle>
      <circle cx="50" cy="36" r="22" fill="black"></circle>
    </mask>
  </defs>

  
  <circle cx="40" cy="40" r="36" fill="url(#luna-glow)"></circle>

  
  <circle cx="40" cy="40" r="28" fill="none" stroke="url(#luna-ring)" stroke-width="5"></circle>

  
  <circle cx="40" cy="40" r="26" fill="url(#luna-ring)" mask="url(#luna-crescent)"></circle>

  
  <circle cx="58" cy="26" r="3" fill="#ffd28a"></circle>
  <circle cx="58" cy="26" r="6" fill="#ffd28a" fill-opacity="0.25"></circle>

  
  <text x="92" y="52" font-family="Fraunces, Georgia, serif" font-size="38" font-weight="400" letter-spacing="-1" fill="#eef1ff">Lunaspot</text>
</svg>